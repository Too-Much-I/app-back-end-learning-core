spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: tosunsaeng-db
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}

  servlet:
    multipart:
      max-file-size: 10MB      # 파일 하나당 최대 크기 (필요 시 20MB 등으로 늘리세요)
      max-request-size: 10MB   # 요청 하나당 최대 크기

jwt:
  secret: ${JWT_SECRET_KEY:ThisIsATemporarySecretKeyForTosunsaengProject2026!@#}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

server:
  port: 8080
  tomcat:
    threads:
      max: 20       # 최대 톰캣 스레드 수 제한 (프리티어 메모리 폭발 방지)
      min-spare: 4  # 최소 대기 스레드 수
    max-connections: 100 # 동시에 허용할 최대 커넥션 수

sentry:
  dsn: https://b3d789637d5044a200ef914f12499938@o4511776045400064.ingest.us.sentry.io/4511776050839552
  send-default-pii: true

  # 에러 로그 중 ERROR 레벨 이상만 Sentry 이벤트로 발송
  logging:
    minimum-event-level: error

  # APM 성능 트랜잭션 수집 비율 (1.0 = 100%, 테스트할 때 1.0으로 하고 추후 운영 시 0.1~0.2 조정)
  traces-sample-rate: 1.0

  # 환경 구분 (dev, local, prod 등)
  environment: ${spring.profiles.active:local}