spring:
  application:
    name: app-back-end-learning-core

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:to-teacher-app}

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  auth:
    legacy-user-id: ${LEGACY_USER_ID:00000000-0000-0000-0000-000000000001}
  redis:
    key-prefix: ${REDIS_KEY_PREFIX:learning-core}
  s3:
    key-prefix: ${AWS_S3_KEY_PREFIX:app-learning-core}

jwt:
  secret: ${JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 20
      min-spare: 4
    max-connections: 100

sentry:
  dsn: ${SENTRY_DSN:}
  send-default-pii: false
  logging:
    minimum-event-level: error
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  environment: ${spring.profiles.active:local}
