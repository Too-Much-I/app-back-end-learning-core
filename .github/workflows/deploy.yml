name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 서버로 코드 땡겨오기
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 자바(JDK 17) 환경 세팅 (성환님 프로젝트 자바 버전에 맞게 수정 가능)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Gradle 빌드 권한 부여 및 실제 .jar 파일 빌드 수행
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew clean bootJar # 빌드 찌꺼기 제거 후 pure한 jar 파일 생성

    # 4. 도커 빌드 환경 준비
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 5. 도커 허브 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6. 이제 build/libs가 존재하므로 에러 없이 이미지 빌드 및 push 성공!
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: msde76/tosunsaeng-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 7. AWS EC2에 SSH로 원격 접속하여 도커 컴포즈 리스타트 땡기기
    - name: SSH Command to Deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: 13.209.221.104
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/tosunsaeng
          docker compose pull backend
          docker compose up -d backend
          docker image prune -f